name: CI Pipeline

on:
  push:
    branches: [ main ]


jobs:
    build:
        runs-on: ubuntu-latest


        strategy:
            matrix:
                node-version: [18.x, 20.x, 24.x]
    
        steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
              node-version: '24'

        - name: Install dependencies
          run: npm install

        - name: Run tests
          run: npm test